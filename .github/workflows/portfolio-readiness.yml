name: Portfolio PR and Readiness Audit

on:
  schedule:
    - cron: "35 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-pr-and-production-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build governance and PR reports
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run portfolio:audit
          npm run portfolio:pr:audit
          npm run portfolio:readiness
          npm run portfolio:plan
          npm run portfolio:issues:summary

      - name: Upload readiness artifacts
        uses: actions/upload-artifact@v7
        with:
          name: portfolio-readiness-artifacts
          path: |
            docs/architecture/portfolio-gap-report.md
            docs/architecture/pr-health-report.md
            docs/architecture/production-readiness-report.md
            docs/architecture/remediation-tracker.md
            docs/architecture/remediation-rollout-progress.md
