name: Portfolio Governance Audit

on:
  schedule:
    - cron: "10 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-organization-repositories:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run portfolio audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run portfolio:audit

      - name: Upload audit report artifacts
        uses: actions/upload-artifact@v7
        with:
          name: portfolio-governance-audit
          path: |
            docs/architecture/portfolio-gap-report.md
            docs/architecture/portfolio-gap-report.json
