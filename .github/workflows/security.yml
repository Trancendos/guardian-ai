name: Security and Dependency Governance

on:
  push:
    branches:
      - main
      - "cursor/**"
  pull_request:
  schedule:
    - cron: "20 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  cve-and-policy-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm run security:audit

      - name: Enforce N-to-N-1 policy
        run: npm run deps:n-policy

      - name: Generate dependency drift report
        run: npm run deps:outdated

      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom.cdx.json

      - name: Upload security artifacts
        uses: actions/upload-artifact@v7
        with:
          name: security-artifacts
          path: |
            sbom.cdx.json

  trivy-filesystem-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
